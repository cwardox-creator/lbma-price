name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      - name: Create Flutter project scaffold
        run: |
          flutter create --org com.lbma --project-name lbma_gold_price /tmp/lbma_app
          cp -r lib /tmp/lbma_app/
          cp pubspec.yaml /tmp/lbma_app/pubspec.yaml
          cp -r icons/mipmap-* /tmp/lbma_app/android/app/src/main/res/ 2>/dev/null || true

      - name: Add INTERNET permission and set app label
        run: |
          sed -i 's/<manifest xmlns:android="http:\/\/schemas.android.com\/apk\/res\/android">/<manifest xmlns:android="http:\/\/schemas.android.com\/apk\/res\/android">\n    <uses-permission android:name="android.permission.INTERNET"\/>/' /tmp/lbma_app/android/app/src/main/AndroidManifest.xml
          sed -i 's/android:label="[^"]*"/android:label="LBMA TK"/' /tmp/lbma_app/android/app/src/main/AndroidManifest.xml

      - name: Fix Kotlin stdlib conflict
        run: |
          sed -i 's/ext.kotlin_version = .*/ext.kotlin_version = "2.0.0"/' /tmp/lbma_app/android/build.gradle
          cat >> /tmp/lbma_app/android/app/build.gradle << 'GRADLE'

          configurations.all {
              resolutionStrategy {
                  force "org.jetbrains.kotlin:kotlin-stdlib:2.0.0"
                  force "org.jetbrains.kotlin:kotlin-stdlib-jdk7:2.0.0"
                  force "org.jetbrains.kotlin:kotlin-stdlib-jdk8:2.0.0"
              }
          }
          GRADLE

      - name: Get dependencies
        working-directory: /tmp/lbma_app
        run: flutter pub get

      - name: Build APK
        working-directory: /tmp/lbma_app
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: lbma-gold-price.apk
          path: /tmp/lbma_app/build/app/outputs/flutter-apk/app-release.apk
